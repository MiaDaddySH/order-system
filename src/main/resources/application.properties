spring.application.name=user-order-api
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/user_order_api}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=0
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.open-in-view=false
app.auth.jwt-secret=${JWT_SECRET:dev-secret-change-me-32-characters-min}
app.auth.jwt-expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.auth.login.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:5}
app.auth.login.block-seconds=${LOGIN_BLOCK_SECONDS:300}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
