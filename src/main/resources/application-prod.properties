spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.open-in-view=false
app.auth.jwt-secret=${JWT_SECRET}
app.auth.jwt-expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.auth.login.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:5}
app.auth.login.block-seconds=${LOGIN_BLOCK_SECONDS:300}
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
server.port=${SERVER_PORT:8080}
