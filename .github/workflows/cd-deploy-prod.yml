name: CD Deploy Prod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: user_order_api
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d user_order_api"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_URL: jdbc:postgresql://localhost:5432/user_order_api
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build package
        run: ./mvnw -B -DskipTests clean package

      - name: Write deploy key
        run: |
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key

      - name: Validate deploy key
        run: |
          ssh-keygen -y -P "" -f ~/.ssh/prod_key >/dev/null || {
            echo "PROD_SSH_PRIVATE_KEY is passphrase-protected. Use an unencrypted deploy key for GitHub Actions."
            exit 1
          }

      - name: Add host key
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Build docker image
        run: |
          IMAGE_TAG="user-order-api:${GITHUB_SHA}"
          docker build --build-arg JAR_FILE=target/user-order-api-0.0.1-SNAPSHOT.jar -t "$IMAGE_TAG" .
          mkdir -p dist
          docker save "$IMAGE_TAG" -o dist/user-order-api-image.tar

      - name: Upload docker image tar
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          scp -i ~/.ssh/prod_key -o IdentitiesOnly=yes -P "$PORT" dist/user-order-api-image.tar "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/tmp/user-order-api-image.tar"

      - name: Deploy and restart service
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -T -i ~/.ssh/prod_key -o IdentitiesOnly=yes -p "$PORT" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "PROD_BASE_URL='${PROD_BASE_URL}' DEPLOY_SHA='${GITHUB_SHA}' bash -s" << 'EOF'
          set -euo pipefail
          CONTAINER_NAME="user-order-api"
          NEW_IMAGE="user-order-api:${DEPLOY_SHA}"
          BASE_URL="${PROD_BASE_URL:-https://api.junfengtech.com}"
          if ! sudo -n docker version >/dev/null 2>&1; then
            echo "docker is not available for deploy user. install docker and allow sudo -n docker."
            exit 1
          fi
          PREV_IMAGE="$(sudo -n docker inspect --format='{{.Config.Image}}' "$CONTAINER_NAME" 2>/dev/null || true)"
          sudo -n docker load -i /tmp/user-order-api-image.tar >/dev/null
          OLD_PORT_CONTAINERS="$(sudo -n docker ps -q --filter publish=8080 || true)"
          if [ -n "$OLD_PORT_CONTAINERS" ]; then
            echo "removing existing containers exposing port 8080: $OLD_PORT_CONTAINERS"
            sudo -n docker rm -f $OLD_PORT_CONTAINERS >/dev/null 2>&1 || true
          fi
          sudo -n docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          if ss -lntp | grep -q ':8080 '; then
            echo "port 8080 is still occupied before docker run"
            ss -lntp | grep ':8080 ' || true
            if sudo -n systemctl stop user-order-api >/dev/null 2>&1; then
              echo "stopped legacy systemd service user-order-api to free port 8080"
              sleep 2
            fi
          fi
          if ss -lntp | grep -q ':8080 '; then
            echo "port 8080 is occupied by a non-container process. please stop/disable legacy service manually."
            ss -lntp | grep ':8080 ' || true
            exit 1
          fi
          sudo -n docker run -d --name "$CONTAINER_NAME" --restart unless-stopped --env-file /opt/user-order-api/.env.prod -p 127.0.0.1:8080:8080 "$NEW_IMAGE" >/dev/null
          HEALTH_OK=0
          for i in $(seq 1 24); do
            if curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null; then
              HEALTH_OK=1
              echo "health check passed"
              break
            fi
            sleep 5
          done
          if [ "$HEALTH_OK" -eq 1 ]; then
            echo "running smoke test on ${BASE_URL}"
            set +e
            SMOKE_STARTED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            SMOKE_EMAIL="smoke_$(date +%s)@example.com"
            SMOKE_PASSWORD="SmokePass123"
            curl -fsS -X POST "${BASE_URL}/users/register" -H "Content-Type: application/json" -d "{\"email\":\"${SMOKE_EMAIL}\",\"password\":\"${SMOKE_PASSWORD}\"}" >/dev/null
            LOGIN_RESP="$(curl -fsS -X POST "${BASE_URL}/users/login" -H "Content-Type: application/json" -d "{\"email\":\"${SMOKE_EMAIL}\",\"password\":\"${SMOKE_PASSWORD}\"}")"
            TOKEN="$(printf '%s' "$LOGIN_RESP" | python3 -c 'import json,sys; print(json.load(sys.stdin)["token"])')"
            AUTH_HEADER="Authorization: Bearer ${TOKEN}"
            ORDER_RESP="$(curl -fsS -X POST "${BASE_URL}/orders" -H "Content-Type: application/json" -H "$AUTH_HEADER" -d '{"product":"smoke-item","quantity":1}')"
            printf '%s' "$ORDER_RESP" | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data.get("product")=="smoke-item"; assert data.get("quantity")==1'
            ORDERS_RESP="$(curl -fsS "${BASE_URL}/orders" -H "$AUTH_HEADER")"
            SMOKE_STATUS=$?
            set -e
            if [ "$SMOKE_STATUS" -eq 0 ]; then
              ORDER_ID="$(printf '%s' "$ORDER_RESP" | python3 -c 'import json,sys; print(json.load(sys.stdin).get("id",""))')"
              ORDERS_COUNT="$(printf '%s' "$ORDERS_RESP" | python3 -c 'import json,sys; data=json.load(sys.stdin); print(len(data) if isinstance(data,list) else -1)')"
              SMOKE_FINISHED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
              echo "smoke test passed"
              echo "smoke_summary started_at=${SMOKE_STARTED_AT} finished_at=${SMOKE_FINISHED_AT} base_url=${BASE_URL} email=${SMOKE_EMAIL} order_id=${ORDER_ID} orders_count=${ORDERS_COUNT}"
              exit 0
            fi
            SMOKE_FINISHED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "smoke test failed, rolling back to previous image"
            echo "smoke_summary started_at=${SMOKE_STARTED_AT} finished_at=${SMOKE_FINISHED_AT} base_url=${BASE_URL} email=${SMOKE_EMAIL} status=${SMOKE_STATUS}"
          fi
          if [ -n "$PREV_IMAGE" ]; then
            echo "rolling back to previous image: ${PREV_IMAGE}"
            sudo -n docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
            sudo -n docker run -d --name "$CONTAINER_NAME" --restart unless-stopped --env-file /opt/user-order-api/.env.prod -p 127.0.0.1:8080:8080 "$PREV_IMAGE" >/dev/null || true
          fi
          echo "deployment verification failed, collecting diagnostics"
          sudo -n docker ps -a --filter "name=${CONTAINER_NAME}" || true
          sudo -n docker logs --tail 120 "$CONTAINER_NAME" || true
          ss -lntp | grep 8080 || true
          exit 1
          EOF
