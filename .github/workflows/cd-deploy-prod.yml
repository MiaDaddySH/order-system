name: CD Deploy Prod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: user_order_api
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d user_order_api"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_URL: jdbc:postgresql://localhost:5432/user_order_api
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

      - name: Build package
        run: ./mvnw -B -DskipTests clean package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/user-order-api-0.0.1-SNAPSHOT.jar
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: dist

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Add host key
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload jar
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          scp -P "$PORT" dist/user-order-api-0.0.1-SNAPSHOT.jar "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/tmp/app.jar"

      - name: Deploy and restart service
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -p "$PORT" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" << 'EOF'
          set -euo pipefail
          sudo -n install -o app -g app -m 644 /tmp/app.jar /opt/user-order-api/app.jar
          sudo -n systemctl restart user-order-api
          sleep 8
          curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null
          EOF
