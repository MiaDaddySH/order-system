name: CD Deploy Prod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: user_order_api
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d user_order_api"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_URL: jdbc:postgresql://localhost:5432/user_order_api
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B test

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build package
        run: ./mvnw -B -DskipTests clean package

      - name: Write deploy key
        run: |
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key

      - name: Validate deploy key
        run: |
          ssh-keygen -y -P "" -f ~/.ssh/prod_key >/dev/null || {
            echo "PROD_SSH_PRIVATE_KEY is passphrase-protected. Use an unencrypted deploy key for GitHub Actions."
            exit 1
          }

      - name: Add host key
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload jar
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          scp -i ~/.ssh/prod_key -o IdentitiesOnly=yes -P "$PORT" target/user-order-api-0.0.1-SNAPSHOT.jar "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/tmp/app.jar"

      - name: Deploy and restart service
        env:
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -T -i ~/.ssh/prod_key -o IdentitiesOnly=yes -p "$PORT" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "bash -s" << 'EOF'
          set -euo pipefail
          APP_JAR="/opt/user-order-api/app.jar"
          BACKUP_JAR="/opt/user-order-api/app.jar.prev"
          if [ -f "$APP_JAR" ]; then
            sudo -n cp "$APP_JAR" "$BACKUP_JAR"
          fi
          sudo -n install -o app -g app -m 644 /tmp/app.jar /opt/user-order-api/app.jar
          sudo -n systemctl restart user-order-api
          HEALTH_OK=0
          for i in $(seq 1 24); do
            if curl -fsS http://127.0.0.1:8080/actuator/health >/dev/null; then
              HEALTH_OK=1
              echo "health check passed"
              break
            fi
            sleep 5
          done
          if [ "$HEALTH_OK" -eq 1 ]; then
            exit 0
          fi
          if [ -f "$BACKUP_JAR" ]; then
            echo "health check failed, rolling back to previous jar"
            sudo -n install -o app -g app -m 644 "$BACKUP_JAR" "$APP_JAR"
            sudo -n systemctl restart user-order-api || true
          fi
          echo "health check failed, collecting diagnostics"
          sudo -n systemctl status user-order-api --no-pager || true
          sudo -n journalctl -u user-order-api -n 120 --no-pager || true
          sudo -n ss -lntp | grep 8080 || true
          exit 1
          EOF
